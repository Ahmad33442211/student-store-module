<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Store Module</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Student Store Module</h1>
    <p>Simple E-commerce Product Page</p>
  </header>

  <main>
    <section class="form-section">
      <h2>Add Product</h2>
      <form id="productForm">
        <input type="text" id="storeId" placeholder="Store ID" required />
        <input type="text" id="storeName" placeholder="Store Name" required />
        <input type="text" id="productId" placeholder="Product ID" required />
        <input type="text" id="productName" placeholder="Product Name" required />
        <input type="number" id="price" placeholder="Price" step="0.01" required />
        <button type="submit">Add Product</button>
      </form>
    </section>

    <section class="products-section">
      <h2>Products</h2>
      <div id="productList" class="product-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
